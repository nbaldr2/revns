global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'revns-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics

  - job_name: 'scylla'
    static_configs:
      - targets: ['scylla:9180']
